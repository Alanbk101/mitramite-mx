<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0EA5E9" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Icon: Rounded clipboard with checkmark -->
  <g filter="url(#softShadow)">
    <rect x="12" y="20" width="72" height="88" rx="16" ry="16" fill="url(#iconGrad)"/>
    <rect x="30" y="12" width="36" height="20" rx="8" ry="8" fill="url(#iconGrad)"/>
    <rect x="34" y="16" width="28" height="12" rx="5" ry="5" fill="white"/>
    
    <circle cx="48" cy="68" r="22" fill="white" opacity="0.95"/>
    <polyline points="36,68 44,78 62,58" fill="none" stroke="url(#iconGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <line x1="26" y1="96" x2="70" y2="96" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  </g>
  
  <!-- Text: MiTramite -->
  <text x="100" y="78" font-family="'Nunito', 'Quicksand', 'Poppins', sans-serif" font-size="46" font-weight="800" fill="#1E293B" letter-spacing="-1">
    Mi<tspan fill="url(#brandGrad)" stroke="#1E293B" stroke-width="1" paint-order="stroke">Tramite</tspan>
  </text>
  
  <!-- Mexican flag mini bar -->
  <rect x="102" y="86" width="14" height="3" rx="1.5" fill="#059669"/>
  <rect x="116" y="86" width="14" height="3" rx="1.5" fill="#D1D5DB" stroke="#E2E8F0" stroke-width="0.5"/>
  <rect x="130" y="86" width="14" height="3" rx="1.5" fill="#DC2626"/>
  
  <!-- Tagline -->
  <text x="152" y="93" font-family="'Nunito', 'Quicksand', 'Poppins', sans-serif" font-size="11.5" font-weight="600" fill="#94A3B8" letter-spacing="1.5">
    Tu trámite, sin vueltas
  </text>
</svg>
